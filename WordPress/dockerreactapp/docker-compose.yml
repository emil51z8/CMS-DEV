services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      # Mount your source for live edits
      - .:/app
      # Keep container's node_modules (avoid overwriting by the host)
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true